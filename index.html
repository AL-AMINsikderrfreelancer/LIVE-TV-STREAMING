<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাইভ টিভি সাইট - অটো প্লে</title>
    <!-- ভিডিও প্লেয়ারের জন্য Video.js লাইব্রেরি -->
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        /* ভিডিও প্লেয়ার কন্টেইনার */
        .player-container {
            width: 100%;
            max-width: 800px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .video-js {
            width: 100% !important;
            aspect-ratio: 16 / 9;
        }
        /* চ্যানেল সেকশন */
        .channel-section {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        .channel-title {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        /* বাটন গ্রিড */
        .button-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .channel-btn {
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }
        .channel-btn:hover {
            background-color: #333;
            border-color: #ff0000;
            color: #ff0000;
        }
        .channel-btn.active {
            background-color: #ff0000;
            border-color: #ff0000;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- ভিডিও প্লেয়ার এরিয়া (autoplay এবং muted এট্রিবিউট যোগ করা হয়েছে দ্রুত লোডের জন্য) -->
    <div class="player-container">
        <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" autoplay muted playsinline>
            <p class="vjs-no-js">
                ভিডিও দেখার জন্য ব্রাউজারে জাভাস্ক্রিপ্ট চালু করুন।
            </p>
        </video>
    </div>

    <!-- চ্যানেল লিস্ট এরিয়া -->
    <div class="channel-section">
        <div class="channel-title">চ্যানেল সমূহ:</div>
        <div class="button-grid">
            <button class="channel-btn active" onclick="playChannel('https://live.thebosstv.com:30443/dwlive/Somoy-TV/playlist.m3u8', this)">সময় টিভি</button>
            <button class="channel-btn" onclick="playChannel('https://edge22.776740.ir.cdn.ir/hls2/tv3.m3u8', this)">টি স্পোর্টস</button>
            <button class="channel-btn" onclick="playChannel('https://37b4c228.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWZyX0ZJRkFQbHVzRnJlbmNoX0hMUw/playlist.m3u8', this)">চ্যানেল ৩</button>
        </div>
    </div>

    <!-- Video.js এর স্ক্রিপ্ট ফাইলসমূহ -->
    <script src="https://zencdn.net"></script>
    <script>
        // প্লেয়ার অপশনস সেটআপ (Fast Loading এবং Auto-play এনাবল করা)
        var player = videojs('live-player', {
            autoplay: 'any', // ব্রাউজার যেভাবে সাপোর্ট করে সেভাবে অটো-প্লে করার চেষ্টা করবে
            preload: 'auto',
            muted: true      // ব্রাউজার ব্লকিং এড়াতে এটি অত্যন্ত জরুরি
        });

        // প্রথম লোডে প্রথম চ্যানেলটি সাথে সাথে প্লে করার স্ক্রিপ্ট
        window.onload = function() {
            player.src({
                src: 'https://flussonic.deltainfonet.com/01_Tsports_HD/tracks-v1a1/mono.m3u8',
                type: 'application/x-mpegURL'
            });
            
            // প্লে করার জন্য ফোর্স করা হচ্ছে
            var playPromise = player.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("অটো-প্লে সাময়িকভাবে ব্লক হয়েছে, ইউজার ক্লিক করলেই চলবে।");
                });
            }
        };

        // বাটনে ক্লিক করলে চ্যানেল পরিবর্তন করার ফাংশন
        function playChannel(streamUrl, buttonElement) {
            player.src({
                src: streamUrl,
                type: 'application/x-mpegURL'
            });
            player.play();

            // একটিভ বাটন স্টাইল পরিবর্তন
            var buttons = document.getElementsByClassName('channel-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            buttonElement.classList.add('active');
        }
    </script>
</body>
</html>
