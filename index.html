<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি লাইভ টিভি সাইট</title>
    <!-- Video.js CSS -->
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .player-container { max-width: 800px; margin: 0 auto; background: #000; padding: 10px; border-radius: 8px; }
        .video-js { width: 100% !important; height: 450px !important; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-width: 800px; margin: 20px auto; padding: 10px; }
        .channel-btn { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .channel-btn:hover { background: #00bcd4; border-color: #00bcd4; color: #000; }
    </style>
</head>
<body>

    <h1>আমার লাইভ টিভি চ্যানেল</h1>
    
    <div class="player-container">
        <!-- ভিডিও প্লেয়ার -->
        <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
            <!-- প্রথম বা ডিফল্ট চ্যানেল লিংক -->
            <source id="video-source" src="http://190.61.101.11:7050/play/a09c/index.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <h3>চ্যানেল সমূহ:</h3>
    <div class="channel-grid">
        <!-- আপনার চ্যানেল ও M3U8 লিংকগুলো নিচে বসান -->
        <button class="channel-btn" onclick="playChannel('http://103.151.60.162:2121/play/a00z/index.m3u8')">SHOMOY TV HD</button>
        <button class="channel-btn" onclick="playChannel('http://somoseluno.blog/live/usuario23CD/578f3wuew/541547.m3u8')">DAZN</button>
        <button class="channel-btn" onclick="playChannel('http://103.165.93.31:8095/tsports/tracks-v1a1a2/mono.m3u8')">T SPOTRS</button>
    </div>

    <!-- Video.js Script -->
    <script src="https://zencdn.net"></script>
    <script>
        function playChannel(url) {
            var player = videojs('tv-player');
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();
        }
    </script>
</body>
</html>
