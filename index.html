<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি লাইভ টিভি সাইট</title>
    <!-- Video.js CSS -->
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .player-container { max-width: 800px; margin: 0 auto; background: #000; padding: 10px; border-radius: 8px; }
        .video-js { width: 100% !important; height: 450px !important; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-width: 800px; margin: 20px auto; padding: 10px; }
        .channel-btn { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .channel-btn:hover { background: #00bcd4; border-color: #00bcd4; color: #000; }
    </style>
</head>
<body>

    <h1>আমার লাইভ টিভি চ্যানেল</h1>
    
    <div class="player-container">
        <!-- ভিডিও প্লেয়ার -->
        <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
            <!-- প্রথম বা ডিফল্ট চ্যানেল লিংক -->
            <source src="https://flussonic.deltainfonet.com/01_Tsports_HD/tracks-v1a1/mono.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <h3>চ্যানেল সমূহ:</h3>
    <div class="channel-grid">
        <!-- বাটনের ভেতর আপনার কাঙ্ক্ষিত সচল M3U8 লিংকগুলো বসান -->
        <button class="channel-btn" onclick="playChannel('https://live.thebosstv.com:30443/dwlive/Somoy-TV/playlist.m3u8')">সময় টিভি</button>
        <button class="channel-btn" onclick="playChannel('https://37b4c228.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWZyX0ZJRkFQbHVzRnJlbmNoX0hMUw/playlist.m3u8')">টি স্পোর্টস</button>
        <button class="channel-btn" onclick="playChannel('https://edge22.776740.ir.cdn.ir/hls2/tv3.m3u8')">চ্যানেল ৩</button>
    </div>

    <!-- Video.js Script -->
    <script src="https://zencdn.net"></script>
    
    <script>
        // ভিডিও প্লেয়ার ইনিশিয়ালাইজ করা
        var player = videojs('tv-player');

        // চ্যানেল পরিবর্তন করার মূল ফাংশন
        function playChannel(url) {
            if (player) {
                player.src({
                    src: url,
                    type: 'application/x-mpegURL'
                });
                player.load();
                player.play().catch(function(error) {
                    console.log("Autoplay blocked or link issue: ", error);
                });
            }
        }
    </script>
</body>
</html>
